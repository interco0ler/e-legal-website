<div class="bg-gradient-to-b from-[#0b0b0f] via-[#180018] to-[#12000f]">

    <section class="max-w-7xl mx-auto px-6 lg:px-8 py-14 md:py-20">

        <div class="grid lg:grid-cols-2 gap-6 md:gap-8">
            <div class="bg-white/5 border border-white/10 rounded-2xl p-7 md:p-10">
                <h1 class="text-3xl md:text-4xl font-bold leading-tight mb-4">
                    {{ 'contact.hero.title' | translate }}
                </h1>
                <p class="text-zinc-300 text-base md:text-lg leading-relaxed">
                    {{ 'contact.hero.text' | translate }}
                </p>
            </div>

            <div class="bg-white/5 border border-white/10 rounded-2xl overflow-hidden">
                <img src="/assets/contact/bdrev.png"
                    alt="{{ 'contact.alt.heroImage' | translate }}" class="w-full h-full object-cover aspect-[4/3]">
            </div>
        </div>

        <div class="grid lg:grid-cols-2 gap-6 md:gap-8 mt-6 md:mt-8">
            <div class="bg-white/5 border border-white/10 rounded-2xl overflow-hidden">
                <img src="/assets/contact/coins.png" alt="{{ 'contact.alt.leftImage' | translate }}"
                    class="w-full h-full object-cover aspect-[4/3]">
            </div>

            <div class="bg-white/5 border border-white/10 rounded-2xl p-7 md:p-10 flex flex-col">
                <h2 class="text-xl md:text-2xl font-semibold mb-3">
                    {{ 'contact.pitch.title' | translate }}
                </h2>
                <p class="text-zinc-300 leading-relaxed">
                    {{ 'contact.pitch.text' | translate }}
                </p>

                <div class="mt-6 flex items-center gap-4">
                    <ng-container *ngFor="let s of socials">
                        <a class="inline-flex items-center justify-center w-10 h-10 rounded-full border border-white/15 bg-white/5 hover:bg-white/10 transition"
                            [href]="s.href" target="_blank" rel="noopener" [attr.aria-label]="s.label">
                            <svg *ngIf="s.icon === 'mail'" class="w-5 h-5" viewBox="0 0 24 24" fill="none">
                                <path d="M4 6h16v12H4z" stroke="currentColor" stroke-width="1.5" />
                                <path d="M4 7l8 6 8-6" stroke="currentColor" stroke-width="1.5" />
                            </svg>
                            <svg *ngIf="s.icon === 'discord'" class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M20 4a16 16 0 0 0-4.2-1.3.1.1 0 0 0-.1.1l-.2.9a15 15 0 0 0-7 0l-.2-.9a.1.1 0 0 0-.1-.1A16 16 0 0 0 4 4C2 7 1.5 10 1.7 13a.2.2 0 0 0 .1.2c2 1.5 4 2.4 6.2 2.9a.2.2 0 0 0 .2-.1l.8-1.4a9.6 9.6 0 0 1-1.6-.8.1.1 0 0 1 0-.1h0a7.2 7.2 0 0 0 7.2 0h0a.1.1 0 0 1 0 .1c-.5.3-1.1.6-1.6.8l.8 1.4a.2.2 0 0 0 .2.1c2.2-.5 4.2-1.4 6.2-2.9a.2.2 0 0 0 .1-.2C22.5 10 22 7 20 4ZM9.5 12.5c-.6 0-1.1-.6-1.1-1.3s.5-1.3 1.1-1.3 1.1.6 1.1 1.3-.5 1.3-1.1 1.3Zm5 0c-.6 0-1.1-.6-1.1-1.3s.5-1.3 1.1-1.3 1.1.6 1.1 1.3-.5 1.3-1.1 1.3Z" />
                            </svg>
                            <svg *ngIf="s.icon === 'x'" class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M14.7 4h3.1l-4.8 5.5L20 20h-5.9l-3.7-4.9L5.9 20H2.8l5.2-6-5-6h6l3.4 4.6L14.7 4Z" />
                            </svg>
                            <svg *ngIf="s.icon === 'instagram'" class="w-5 h-5" viewBox="0 0 24 24" fill="none">
                                <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor"
                                    stroke-width="1.5" />
                                <circle cx="12" cy="12" r="3.5" stroke="currentColor" stroke-width="1.5" />
                                <circle cx="17.3" cy="6.7" r="1" fill="currentColor" />
                            </svg>
                            <svg *ngIf="s.icon === 'youtube'" class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M21.6 7.3a3 3 0 0 0-2.1-2.1C17.8 4.8 12 4.8 12 4.8s-5.8 0-7.5.4a3 3 0 0 0-2.1 2.1C2 9 2 12 2 12s0 3 .4 4.7a3 3 0 0 0 2.1 2.1c1.7.4 7.5.4 7.5.4s5.8 0 7.5-.4a3 3 0 0 0 2.1-2.1C22 15 22 12 22 12s0-3-.4-4.7ZM10 15.5v-7l6 3.5-6 3.5Z" />
                            </svg>
                        </a>
                    </ng-container>
                </div>

                <div class="mt-6 flex flex-wrap gap-3">
                    <a href="https://app.webdex.io" target="_blank" rel="noopener"
                        class="bg-pink-500 hover:bg-pink-400 text-white px-5 py-3 rounded-lg font-medium shadow">
                        {{ 'contact.cta.platform' | translate }}
                    </a>
                    <a href="mailto:support@webdex.io"
                        class="bg-white/10 hover:bg-white/20 text-white px-5 py-3 rounded-lg font-medium">
                        {{ 'contact.cta.support' | translate }}
                    </a>
                </div>
            </div>
        </div>

    </section>
</div>
