<div class="bg-gradient-to-b from-[#0b0b0f] via-[#180018] to-[#12000f]">

    <section class="max-w-7xl mx-auto px-6 lg:px-8 pt-32 pb-12">
        <h1 class="text-4xl md:text-5xl font-bold mb-8">
            {{ 'faq.title' | translate }}
        </h1>

        <div class="space-y-4">
            <div *ngFor="let faq of faqs; let i = index" class="bg-white/5 backdrop-blur-sm border border-white/10 rounded-xl overflow-hidden transition-all duration-300">

                <button (click)="toggleFaq(faq)" class="w-full px-6 py-5 flex items-start gap-4 text-left hover:bg-white/5 transition-colors">

                    <div class="flex-shrink-0 w-8 h-8 rounded-full bg-gradient-to-br from-primary to-secondary flex items-center justify-center text-sm font-bold">
                        {{ i + 1 }}
                    </div>

                    <div class="flex-1">
                        <h3 class="text-lg md:text-xl font-medium leading-tight">
                            {{ faq.questionKey | translate }}
                        </h3>
                    </div>

                    <div class="flex-shrink-0 transition-transform duration-300" [ngClass]="{'rotate-180': faq.open}">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white/60" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                </button>

                <div *ngIf="faq.open" class="px-6 pb-5 pl-[72px] animate-fade-in-up">
                    <p class="text-zinc-300 leading-relaxed">
                        {{ faq.answerKey | translate }}
                    </p>
                </div>
            </div>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-6 lg:px-8 py-16">
        <div class="flex flex-col md:flex-row items-center justify-center gap-8 max-w-4xl mx-auto">

            <div class="flex-shrink-0">
                <img src="assets/faq/faqimg.png" alt="Support mascot" class="w-48 h-48 md:w-56 md:h-56 object-contain drop-shadow-[0_0_40px_rgba(255,0,128,0.5)]" style="border-radius: 32px;" />
            </div>

            <div class="flex-1 text-center md:text-left">
                <h2 class="text-2xl md:text-3xl font-bold mb-3">
                    {{ 'faq.cta.title' | translate }}
                </h2>
                <p class="text-zinc-300 text-base leading-relaxed mb-6">
                    {{ 'faq.cta.description' | translate }}
                </p>

                <div class="flex flex-wrap gap-3 justify-center md:justify-start">
                    <a routerLink="/contact" class="bg-pink-500 hover:bg-pink-400 text-white px-5 py-2.5 rounded-lg text-sm font-medium shadow transition">
                        {{ 'faq.cta.support' | translate }}
                    </a>
                    <a routerLink="/contact" class="bg-white/10 hover:bg-white/20 text-white px-5 py-2.5 rounded-lg text-sm font-medium transition">
                        {{ 'faq.cta.nextCall' | translate }}
                    </a>
                </div>
            </div>
        </div>
    </section>

</div>
